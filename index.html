<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Protein Structure Viewer</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    #ui {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      background: rgba(20, 22, 28, 0.85); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 12px 14px; color: #e7e9ee; width: 248px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    }
    #ui h1 { font-size: 14px; margin: 0 0 10px; font-weight: 600; letter-spacing: .2px; }
    label { font-size: 11px; opacity: .7; display: block; margin: 8px 0 4px; text-transform: uppercase; letter-spacing: .5px; }
    .row { display: flex; gap: 6px; }
    input[type=text] {
      flex: 1; min-width: 0; background: #11131a; border: 1px solid #2a2e3a;
      color: #e7e9ee; border-radius: 6px; padding: 6px 8px; font-size: 13px; text-transform: uppercase;
    }
    button {
      background: #3b82f6; border: 0; color: white; border-radius: 6px;
      padding: 6px 12px; font-size: 13px; cursor: pointer; font-weight: 500;
    }
    button:hover { filter: brightness(1.12); }
    button.toggle { background: #232733; flex: 1; }
    button.toggle.active { background: #3b82f6; }
    .examples { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .examples button { background: #232733; padding: 4px 8px; font-size: 11px; }
    #scaleBtn { width: 100%; margin-top: 8px; }
    #status { font-size: 11px; margin-top: 10px; min-height: 14px; opacity: .8; }
    #status.error { color: #f87171; opacity: 1; }

    #info {
      position: absolute; bottom: 12px; left: 12px; z-index: 10;
      background: rgba(20,22,28,0.85); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 8px 12px; color: #aeb4c2; font-size: 11px; line-height: 1.5;
    }

    #tip {
      position: absolute; z-index: 20; pointer-events: none; display: none;
      background: rgba(10,12,18,0.95); border: 1px solid #3b82f6; border-radius: 6px;
      padding: 6px 9px; color: #e7e9ee; font-size: 12px; line-height: 1.45;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5); white-space: nowrap;
    }
    #tip b { color: #7eb0ff; }

    #protein {
      position: absolute; top: 12px; right: 12px; z-index: 10; width: 308px;
      max-height: calc(100vh - 24px); display: flex; flex-direction: column;
      background: rgba(20,22,28,0.85); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      color: #d7dae2; font-size: 12.5px; line-height: 1.5;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4); overflow: hidden;
    }
    .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); flex: none; }
    .tab { flex: 1; background: transparent; border-radius: 0; color: #9aa0ad; padding: 10px 6px; font-weight: 600; font-size: 12px; }
    .tab:hover { background: rgba(255,255,255,0.04); filter: none; }
    .tab.active { color: #fff; box-shadow: inset 0 -2px 0 #3b82f6; }
    .tabpane { padding: 14px 16px; overflow-y: auto; }

    #protein h2 { font-size: 14px; margin: 0 0 2px; color: #fff; }
    #protein .pid { font-size: 11px; opacity: .6; letter-spacing: 1px; margin-bottom: 10px; }
    #protein .meta { display: grid; grid-template-columns: auto 1fr; gap: 3px 10px; margin-bottom: 10px; }
    #protein .meta span:nth-child(odd) { opacity: .55; text-transform: uppercase; font-size: 10px; letter-spacing: .5px; align-self: center; }
    #protein .entity { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 8px; margin-top: 8px; }
    #protein .entity .nm { font-weight: 600; color: #fff; }
    #protein .entity .org { font-style: italic; opacity: .8; font-size: 11.5px; }
    #protein .cite { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 8px; margin-top: 8px; font-size: 11px; opacity: .8; }
    #protein a { color: #7eb0ff; }
    #protein .loading { opacity: .5; }
    .simrow {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      width: 100%; background: #232733; margin-bottom: 5px; padding: 7px 10px; font-size: 12px;
    }
    .simrow:hover { background: #2f3340; }
    .simrow .pct { font-size: 11px; opacity: .7; }
    .simhelp { font-size: 11px; line-height: 1.55; opacity: .75; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 6px; padding: 9px 11px; margin-bottom: 11px; }
    .simhelp b { color: #9cc2ff; }
    .simhelp details { margin-top: 6px; }
    .simhelp summary { cursor: pointer; color: #7eb0ff; outline: none; }
    .simhelp details[open] summary { margin-bottom: 4px; }

    #tab-cost .total { display: flex; justify-content: space-between; align-items: baseline; margin: 4px 0; }
    #tab-cost .total .big { font-size: 20px; font-weight: 700; color: #fff; }
    #tab-cost .total .route { font-size: 11px; opacity: .6; text-transform: uppercase; letter-spacing: .5px; }
    #tab-cost .best { border: 1px solid #3b82f6; background: rgba(59,130,246,0.1); border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; }
    #tab-cost .line { display: flex; justify-content: space-between; font-size: 11.5px; padding: 2px 0; opacity: .85; }
    #tab-cost .line.sub { opacity: .55; padding-left: 10px; }
    #tab-cost .warn { color: #fbbf24; }
    #tab-cost .caveat { border-top: 1px solid rgba(255,255,255,0.08); margin-top: 10px; padding-top: 8px; font-size: 10.5px; opacity: .6; line-height: 1.5; }
    #tab-cost .caveat b { color: #9cc2ff; opacity: .9; }
    .costctl { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .costctl label { margin: 0; flex: none; width: 56px; }
    .costctl select, .costctl input { flex: 1; background: #11131a; border: 1px solid #2a2e3a; color: #e7e9ee;
      border-radius: 6px; padding: 5px 7px; font-size: 12px; min-width: 0; }

    #tab-mutate .mutbtn { width: 100%; background: #7c3aed; margin-top: 4px; }
    #tab-mutate .verdict { display: inline-block; font-weight: 600; padding: 3px 9px; border-radius: 5px; margin: 8px 0; font-size: 12px; }
    #tab-mutate .delta-up { color: #34d399; }
    #tab-mutate .delta-down { color: #f87171; }
    #tab-mutate .wtres { font-family: ui-monospace, monospace; font-weight: 700; color: #fff; background: #232733; padding: 2px 8px; border-radius: 4px; }

    textarea#seqInput {
      width: 100%; background: #11131a; border: 1px solid #2a2e3a; color: #cfe3ff;
      border-radius: 6px; padding: 6px 8px; font-size: 11px; line-height: 1.4;
      font-family: ui-monospace, "Cascadia Code", monospace; resize: vertical;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px;
    }
    #foldBtn { width: 100%; background: #7c3aed; }
    #colorBtn { width: 100%; margin-top: 6px; }
    .divider { border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 12px 0 0; }

    .legend { display: flex; flex-wrap: wrap; gap: 8px 10px; margin: 8px 0; font-size: 10.5px; }
    .legend span { display: flex; align-items: center; gap: 5px; opacity: .85; }
    .legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .predbadge { display: inline-block; background: #7c3aed; color: #fff; font-size: 10px;
      font-weight: 600; padding: 2px 7px; border-radius: 4px; margin-bottom: 8px; letter-spacing: .3px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <h1>🧬 Protein Structure Viewer</h1>
    <label>PDB ID</label>
    <div class="row">
      <input id="pdbId" type="text" value="1CRN" maxlength="4" placeholder="e.g. 1CRN" />
      <button id="load">Load</button>
    </div>
    <div class="examples">
      <button data-id="1CRN">1CRN crambin</button>
      <button data-id="1UBQ">1UBQ ubiquitin</button>
      <button data-id="4HHB">4HHB hemoglobin</button>
      <button data-id="1BNA">1BNA DNA</button>
    </div>

    <hr class="divider">
    <label>Or fold a sequence (ESMFold)</label>
    <textarea id="seqInput" rows="2" placeholder="Paste amino acids, e.g. MKVKFNNEEVEL…"></textarea>
    <button id="foldBtn">⚛ Predict structure</button>

    <hr class="divider">
    <label>Representation</label>
    <div class="row">
      <button class="toggle active" data-rep="spacefill">Spacefill</button>
      <button class="toggle" data-rep="backbone">Backbone</button>
    </div>
    <button id="colorBtn" class="toggle">🎨 Color: element</button>
    <button id="scaleBtn" class="toggle">🔬 Compare to cell scale</button>

    <div id="status"></div>
  </div>

  <div id="info">
    Drag to rotate · scroll to zoom · right-drag to pan · <b>click an atom to identify it</b>
  </div>

  <div id="tip"></div>

  <div id="protein">
    <div class="tabs">
      <button class="tab active" data-tab="about">About</button>
      <button class="tab" data-tab="similar">Similar</button>
      <button class="tab" data-tab="cost">Cost</button>
      <button class="tab" data-tab="mutate">Mutate</button>
    </div>
    <div class="tabpane" id="tab-about"><div class="loading">Loading structure info…</div></div>
    <div class="tabpane" id="tab-similar" style="display:none"><div class="loading">—</div></div>
    <div class="tabpane" id="tab-cost" style="display:none"><div class="loading">—</div></div>
    <div class="tabpane" id="tab-mutate" style="display:none"><div class="loading">—</div></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
